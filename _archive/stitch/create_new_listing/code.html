<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Create New Listing - Marinduque Community</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#f4c025",
                        "background-light": "#f8f8f5",
                        "background-dark": "#221e10",
                        "moriones-red": "#D9381E", // Adding a custom color for the specific request
                    },
                    fontFamily: {
                        "display": ["Plus Jakarta Sans", "sans-serif"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 antialiased min-h-screen flex flex-col">
<!-- Header -->
<header class="sticky top-0 z-50 bg-background-light/95 dark:bg-background-dark/95 backdrop-blur-sm border-b border-stone-200 dark:border-stone-800 px-4 py-3 flex items-center justify-between">
<button class="p-2 -ml-2 rounded-full hover:bg-stone-200 dark:hover:bg-stone-800 transition-colors text-slate-900 dark:text-slate-100">
<span class="material-symbols-outlined">close</span>
</button>
<h1 class="text-lg font-bold text-center flex-1">New Listing</h1>
<button class="text-stone-500 dark:text-stone-400 font-semibold text-sm hover:text-primary transition-colors">
            Drafts
        </button>
</header>
<!-- Main Content -->
<main class="flex-1 overflow-y-auto pb-24">
<!-- Photo Upload Section -->
<div class="p-4">
<div class="grid grid-cols-2 gap-3">
<!-- Main Upload Box -->
<button class="col-span-2 aspect-[4/3] rounded-xl border-2 border-dashed border-stone-300 dark:border-stone-700 bg-white dark:bg-stone-900 flex flex-col items-center justify-center gap-3 hover:border-primary transition-colors group relative overflow-hidden">
<div class="w-12 h-12 rounded-full bg-stone-100 dark:bg-stone-800 flex items-center justify-center group-hover:bg-primary/10 transition-colors">
<span class="material-symbols-outlined text-stone-600 dark:text-stone-400 group-hover:text-primary text-2xl">add_a_photo</span>
</div>
<span class="text-stone-600 dark:text-stone-400 font-medium group-hover:text-primary">Add Photos</span>
<span class="text-xs text-stone-400 dark:text-stone-500">0/10 photos added</span>
</button>
<!-- Additional slots (empty state) -->
<!-- Ideally these would appear after adding first photo, but for design we can keep clean or show secondary -->
</div>
<p class="mt-2 text-xs text-stone-500 dark:text-stone-400 px-1">Tip: Listings with photos sell 50% faster in Marinduque.</p>
</div>
<!-- Form Fields -->
<div class="px-4 space-y-6">
<!-- Title -->
<div class="space-y-1">
<label class="block text-sm font-medium text-slate-900 dark:text-slate-100">Title</label>
<input class="w-full rounded-lg bg-white dark:bg-stone-900 border border-stone-200 dark:border-stone-800 focus:border-primary focus:ring-1 focus:ring-primary py-3 px-4 text-slate-900 dark:text-slate-100 placeholder-stone-400" placeholder="What are you selling?" type="text"/>
</div>
<!-- Price -->
<div class="space-y-1">
<label class="block text-sm font-medium text-slate-900 dark:text-slate-100">Price</label>
<div class="relative">
<span class="absolute left-4 top-3.5 text-stone-500">₱</span>
<input class="w-full rounded-lg bg-white dark:bg-stone-900 border border-stone-200 dark:border-stone-800 focus:border-primary focus:ring-1 focus:ring-primary py-3 pl-8 pr-4 text-slate-900 dark:text-slate-100 placeholder-stone-400" placeholder="0.00" type="number"/>
</div>
</div>
<!-- Category -->
<div class="space-y-1">
<label class="block text-sm font-medium text-slate-900 dark:text-slate-100">Category</label>
<div class="relative">
<select class="w-full rounded-lg bg-white dark:bg-stone-900 border border-stone-200 dark:border-stone-800 focus:border-primary focus:ring-1 focus:ring-primary py-3 px-4 text-slate-900 dark:text-slate-100 appearance-none">
<option disabled="" selected="" value="">Select Category</option>
<option value="electronics">Electronics</option>
<option value="vehicles">Vehicles</option>
<option value="property">Property Rentals</option>
<option value="clothing">Clothing &amp; Apparel</option>
<option value="services">Home Services</option>
<option value="handicrafts">Local Handicrafts</option>
</select>
<span class="material-symbols-outlined absolute right-4 top-3.5 text-stone-500 pointer-events-none">expand_more</span>
</div>
</div>
<!-- Location / Town -->
<div class="space-y-1">
<label class="block text-sm font-medium text-slate-900 dark:text-slate-100">Town</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-3.5 text-stone-500">location_on</span>
<select class="w-full rounded-lg bg-white dark:bg-stone-900 border border-stone-200 dark:border-stone-800 focus:border-primary focus:ring-1 focus:ring-primary py-3 pl-11 pr-4 text-slate-900 dark:text-slate-100 appearance-none">
<option disabled="" selected="" value="">Select Town</option>
<option value="boac">Boac</option>
<option value="mogpog">Mogpog</option>
<option value="gasan">Gasan</option>
<option value="buenavista">Buenavista</option>
<option value="torrijos">Torrijos</option>
<option value="santa_cruz">Santa Cruz</option>
</select>
<span class="material-symbols-outlined absolute right-4 top-3.5 text-stone-500 pointer-events-none">expand_more</span>
</div>
</div>
<!-- Description -->
<div class="space-y-1">
<label class="block text-sm font-medium text-slate-900 dark:text-slate-100">Description</label>
<textarea class="w-full rounded-lg bg-white dark:bg-stone-900 border border-stone-200 dark:border-stone-800 focus:border-primary focus:ring-1 focus:ring-primary py-3 px-4 text-slate-900 dark:text-slate-100 placeholder-stone-400 resize-none" placeholder="Describe your item in detail (condition, reason for selling, meet-up preferences)..." rows="4"></textarea>
</div>
<!-- Toggle: Delivery -->
<div class="flex items-center justify-between py-2 border-t border-stone-200 dark:border-stone-800">
<div class="flex flex-col">
<span class="font-medium text-slate-900 dark:text-slate-100">Delivery Available</span>
<span class="text-xs text-stone-500">Willing to deliver within Marinduque?</span>
</div>
<label class="relative inline-flex items-center cursor-pointer">
<input class="sr-only peer" type="checkbox" value=""/>
<div class="w-11 h-6 bg-stone-300 peer-focus:outline-none peer-focus:ring-2 peer-focus:ring-primary/50 dark:peer-focus:ring-primary/80 rounded-full peer dark:bg-stone-700 peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all dark:border-gray-600 peer-checked:bg-primary"></div>
</label>
</div>
</div>
<!-- Action Button -->
<div class="p-4 mt-4">
<button class="w-full bg-moriones-red hover:opacity-90 text-white font-bold text-lg py-4 rounded-full shadow-lg transition-all active:scale-[0.98] flex items-center justify-center gap-2">
<span>Post Listing</span>
<span class="material-symbols-outlined text-xl">arrow_forward</span>
</button>
<p class="text-center text-xs text-stone-400 mt-3">
                By posting, you agree to our <a class="text-primary hover:underline" href="#">Community Guidelines</a>.
            </p>
</div>
</main>
<!-- Bottom Navigation -->
<nav class="fixed bottom-0 left-0 right-0 z-40 bg-white dark:bg-background-dark border-t border-stone-200 dark:border-stone-800 pb-safe pt-2 px-2 flex justify-around items-end shadow-[0_-4px_6px_-1px_rgba(0,0,0,0.05)]">
<a class="flex flex-col items-center gap-1 p-2 min-w-[64px] group" href="#">
<span class="material-symbols-outlined text-stone-400 group-hover:text-primary transition-colors text-[24px]">home</span>
<span class="text-[10px] font-medium text-stone-400 group-hover:text-primary transition-colors">Home</span>
</a>
<a class="flex flex-col items-center gap-1 p-2 min-w-[64px] group" href="#">
<span class="material-symbols-outlined text-stone-400 group-hover:text-primary transition-colors text-[24px]">storefront</span>
<span class="text-[10px] font-medium text-stone-400 group-hover:text-primary transition-colors">Market</span>
</a>
<a class="flex flex-col items-center gap-1 p-2 min-w-[64px]" href="#">
<div class="w-10 h-10 rounded-full bg-primary flex items-center justify-center shadow-lg -mt-6 border-4 border-background-light dark:border-background-dark">
<span class="material-symbols-outlined text-background-dark text-[24px]">add</span>
</div>
<span class="text-[10px] font-bold text-primary mt-1">Sell</span>
</a>
<a class="flex flex-col items-center gap-1 p-2 min-w-[64px] group" href="#">
<span class="material-symbols-outlined text-stone-400 group-hover:text-primary transition-colors text-[24px]">chat_bubble</span>
<span class="text-[10px] font-medium text-stone-400 group-hover:text-primary transition-colors">Chat</span>
</a>
<a class="flex flex-col items-center gap-1 p-2 min-w-[64px] group" href="#">
<span class="material-symbols-outlined text-stone-400 group-hover:text-primary transition-colors text-[24px]">person</span>
<span class="text-[10px] font-medium text-stone-400 group-hover:text-primary transition-colors">Profile</span>
</a>
</nav>
<!-- Safe area padding for mobile -->
<div class="h-6 w-full bg-transparent"></div>
</body></html>
