<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Create Job Post</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#13ecda",
                        "background-light": "#f6f8f8",
                        "background-dark": "#102220",
                        "surface-light": "#ffffff",
                        "surface-dark": "#1a2c2a",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display antialiased min-h-screen flex flex-col">
<!-- Header / Navigation -->
<div class="sticky top-0 z-50 bg-surface-light dark:bg-surface-dark border-b border-gray-100 dark:border-gray-800 shadow-sm">
<div class="flex items-center justify-between p-4 h-16">
<button class="text-slate-900 dark:text-slate-100 flex items-center justify-center rounded-full w-10 h-10 hover:bg-gray-100 dark:hover:bg-gray-800 transition-colors">
<span class="material-symbols-outlined" style="font-size: 24px;">arrow_back</span>
</button>
<h1 class="text-slate-900 dark:text-slate-100 text-lg font-bold leading-tight tracking-tight flex-1 text-center">Create Job Post</h1>
<div class="w-10"></div> <!-- Spacer for center alignment -->
</div>
<!-- Progress Stepper -->
<div class="flex w-full flex-row items-center justify-center gap-3 pb-4">
<div class="h-2 w-8 rounded-full bg-primary"></div>
<div class="h-2 w-2 rounded-full bg-gray-200 dark:bg-gray-700"></div>
<div class="h-2 w-2 rounded-full bg-gray-200 dark:bg-gray-700"></div>
</div>
</div>
<!-- Main Content -->
<main class="flex-1 overflow-y-auto pb-24 px-4 pt-6 max-w-lg mx-auto w-full">
<form class="space-y-6">
<!-- Job Title -->
<div class="space-y-2">
<label class="block text-slate-900 dark:text-slate-100 text-sm font-semibold">Job Title</label>
<input class="w-full h-14 rounded-lg bg-white dark:bg-surface-dark border border-gray-200 dark:border-gray-700 px-4 text-base text-slate-900 dark:text-slate-100 placeholder:text-gray-400 focus:border-primary focus:ring-1 focus:ring-primary focus:outline-none transition-all" placeholder="e.g. Sales Associate" type="text"/>
</div>
<!-- Job Type -->
<div class="space-y-2">
<label class="block text-slate-900 dark:text-slate-100 text-sm font-semibold">Job Type</label>
<div class="flex flex-wrap gap-3">
<label class="cursor-pointer">
<input checked="" class="peer sr-only" name="job_type" type="radio"/>
<div class="px-5 py-3 rounded-lg border border-gray-200 dark:border-gray-700 bg-white dark:bg-surface-dark text-slate-600 dark:text-slate-300 text-sm font-medium transition-all hover:bg-gray-50 dark:hover:bg-gray-800 peer-checked:border-primary peer-checked:bg-primary/10 peer-checked:text-slate-900 dark:peer-checked:text-white peer-checked:ring-1 peer-checked:ring-primary">
                            Full-time
                        </div>
</label>
<label class="cursor-pointer">
<input class="peer sr-only" name="job_type" type="radio"/>
<div class="px-5 py-3 rounded-lg border border-gray-200 dark:border-gray-700 bg-white dark:bg-surface-dark text-slate-600 dark:text-slate-300 text-sm font-medium transition-all hover:bg-gray-50 dark:hover:bg-gray-800 peer-checked:border-primary peer-checked:bg-primary/10 peer-checked:text-slate-900 dark:peer-checked:text-white peer-checked:ring-1 peer-checked:ring-primary">
                            Part-time
                        </div>
</label>
<label class="cursor-pointer">
<input class="peer sr-only" name="job_type" type="radio"/>
<div class="px-5 py-3 rounded-lg border border-gray-200 dark:border-gray-700 bg-white dark:bg-surface-dark text-slate-600 dark:text-slate-300 text-sm font-medium transition-all hover:bg-gray-50 dark:hover:bg-gray-800 peer-checked:border-primary peer-checked:bg-primary/10 peer-checked:text-slate-900 dark:peer-checked:text-white peer-checked:ring-1 peer-checked:ring-primary">
                            Casual
                        </div>
</label>
</div>
</div>
<!-- Salary Range -->
<div class="space-y-2">
<label class="block text-slate-900 dark:text-slate-100 text-sm font-semibold">Salary Range (PHP)</label>
<div class="flex gap-4">
<div class="relative flex-1">
<span class="absolute left-4 top-1/2 -translate-y-1/2 text-gray-400 text-sm">Min</span>
<input class="w-full h-14 pl-12 pr-4 rounded-lg bg-white dark:bg-surface-dark border border-gray-200 dark:border-gray-700 text-slate-900 dark:text-slate-100 placeholder:text-gray-400 focus:border-primary focus:ring-1 focus:ring-primary focus:outline-none" placeholder="0" type="number"/>
</div>
<div class="relative flex-1">
<span class="absolute left-4 top-1/2 -translate-y-1/2 text-gray-400 text-sm">Max</span>
<input class="w-full h-14 pl-12 pr-4 rounded-lg bg-white dark:bg-surface-dark border border-gray-200 dark:border-gray-700 text-slate-900 dark:text-slate-100 placeholder:text-gray-400 focus:border-primary focus:ring-1 focus:ring-primary focus:outline-none" placeholder="0" type="number"/>
</div>
</div>
</div>
<!-- Town Picker -->
<div class="space-y-2">
<label class="block text-slate-900 dark:text-slate-100 text-sm font-semibold">Location (Town)</label>
<div class="relative">
<select class="w-full h-14 appearance-none rounded-lg bg-white dark:bg-surface-dark border border-gray-200 dark:border-gray-700 px-4 text-base text-slate-900 dark:text-slate-100 focus:border-primary focus:ring-1 focus:ring-primary focus:outline-none">
<option disabled="" selected="" value="">Select a town in Marinduque</option>
<option value="boac">Boac</option>
<option value="buenavista">Buenavista</option>
<option value="gasan">Gasan</option>
<option value="mogpog">Mogpog</option>
<option value="santa_cruz">Santa Cruz</option>
<option value="torrijos">Torrijos</option>
</select>
<div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-4 text-gray-500">
<span class="material-symbols-outlined">expand_more</span>
</div>
</div>
</div>
<!-- Job Description -->
<div class="space-y-2">
<label class="block text-slate-900 dark:text-slate-100 text-sm font-semibold">Description</label>
<textarea class="w-full min-h-[140px] resize-none rounded-lg bg-white dark:bg-surface-dark border border-gray-200 dark:border-gray-700 p-4 text-base text-slate-900 dark:text-slate-100 placeholder:text-gray-400 focus:border-primary focus:ring-1 focus:ring-primary focus:outline-none" placeholder="Describe the role, responsibilities, and what you're looking for..."></textarea>
</div>
<!-- Requirements -->
<div class="space-y-3">
<div class="flex items-center justify-between">
<label class="block text-slate-900 dark:text-slate-100 text-sm font-semibold">Requirements</label>
<button class="text-primary text-sm font-medium hover:text-primary/80 flex items-center gap-1" type="button">
<span class="material-symbols-outlined" style="font-size: 18px;">add</span> Add more
                    </button>
</div>
<div class="flex items-center gap-2">
<span class="text-primary material-symbols-outlined" style="font-size: 20px;">check_circle</span>
<input class="flex-1 bg-transparent border-b border-gray-200 dark:border-gray-700 py-2 text-slate-900 dark:text-slate-100 placeholder:text-gray-400 focus:border-primary focus:outline-none" placeholder="e.g. Must have own motorcycle" type="text"/>
</div>
<div class="flex items-center gap-2">
<span class="text-primary material-symbols-outlined" style="font-size: 20px;">check_circle</span>
<input class="flex-1 bg-transparent border-b border-gray-200 dark:border-gray-700 py-2 text-slate-900 dark:text-slate-100 placeholder:text-gray-400 focus:border-primary focus:outline-none" placeholder="e.g. Valid Driver's License" type="text"/>
</div>
<div class="flex items-center gap-2">
<span class="text-gray-300 dark:text-gray-600 material-symbols-outlined" style="font-size: 20px;">radio_button_unchecked</span>
<input class="flex-1 bg-transparent border-b border-gray-200 dark:border-gray-700 py-2 text-slate-900 dark:text-slate-100 placeholder:text-gray-400 focus:border-primary focus:outline-none" placeholder="Add requirement..." type="text"/>
</div>
</div>
<!-- Post Button -->
<div class="pt-4 pb-8">
<button class="w-full rounded-xl bg-primary py-4 text-base font-bold text-slate-900 shadow-lg shadow-primary/20 hover:bg-primary/90 hover:shadow-primary/40 transition-all active:scale-[0.98]" type="button">
                    Review &amp; Post Job
                </button>
</div>
</form>
</main>
<!-- Bottom Navigation -->
<div class="fixed bottom-0 w-full bg-surface-light dark:bg-surface-dark border-t border-gray-100 dark:border-gray-800 pb-safe pt-2">
<div class="flex justify-around items-end px-2 pb-3">
<a class="flex flex-1 flex-col items-center gap-1 text-gray-400 hover:text-primary transition-colors group" href="#">
<span class="material-symbols-outlined group-hover:scale-110 transition-transform" style="font-size: 24px;">home</span>
<span class="text-[10px] font-medium">Home</span>
</a>
<a class="flex flex-1 flex-col items-center gap-1 text-gray-400 hover:text-primary transition-colors group" href="#">
<span class="material-symbols-outlined group-hover:scale-110 transition-transform" style="font-size: 24px;">storefront</span>
<span class="text-[10px] font-medium">Market</span>
</a>
<a class="flex flex-1 flex-col items-center gap-1 text-primary relative" href="#">
<div class="absolute -top-8 bg-primary text-slate-900 rounded-full p-3 shadow-lg shadow-primary/30 border-4 border-background-light dark:border-background-dark">
<span class="material-symbols-outlined" style="font-size: 24px;">add</span>
</div>
<span class="text-[10px] font-medium pt-5">Post</span>
</a>
<a class="flex flex-1 flex-col items-center gap-1 text-gray-400 hover:text-primary transition-colors group" href="#">
<span class="material-symbols-outlined group-hover:scale-110 transition-transform" style="font-size: 24px;">work</span>
<span class="text-[10px] font-medium">Jobs</span>
</a>
<a class="flex flex-1 flex-col items-center gap-1 text-gray-400 hover:text-primary transition-colors group" href="#">
<span class="material-symbols-outlined group-hover:scale-110 transition-transform" style="font-size: 24px;">account_circle</span>
<span class="text-[10px] font-medium">Profile</span>
</a>
</div>
</div>
</body></html>
