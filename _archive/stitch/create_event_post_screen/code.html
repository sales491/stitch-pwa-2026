<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Create Event Post</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
          darkMode: "class",
          theme: {
            extend: {
              colors: {
                "primary": "#f2d00d",
                "background-light": "#f8f8f5",
                "background-dark": "#221f10",
              },
              fontFamily: {
                "display": ["Plus Jakarta Sans", "sans-serif"]
              },
              borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
            },
          },
        }
    </script>
<style>
        /* Custom scrollbar hide for cleaner mobile feel */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 antialiased min-h-screen">
<div class="relative flex min-h-screen w-full flex-col max-w-md mx-auto bg-white dark:bg-zinc-900 shadow-xl overflow-x-hidden">
<!-- Header -->
<header class="sticky top-0 z-10 flex items-center bg-white dark:bg-zinc-900 px-4 py-3 justify-between border-b border-gray-100 dark:border-zinc-800">
<button class="flex size-10 items-center justify-center rounded-full hover:bg-gray-100 dark:hover:bg-zinc-800 transition-colors text-slate-900 dark:text-slate-100">
<span class="material-symbols-outlined">arrow_back</span>
</button>
<h2 class="text-lg font-bold leading-tight flex-1 text-center pr-10">Create Event</h2>
</header>
<!-- Main Content Form -->
<main class="flex-1 overflow-y-auto no-scrollbar pb-24">
<!-- Upload Section -->
<div class="px-4 py-5">
<div class="w-full aspect-[16/9] bg-background-light dark:bg-zinc-800 border-2 border-dashed border-primary/40 dark:border-primary/20 rounded-xl flex flex-col items-center justify-center cursor-pointer hover:bg-primary/5 transition-colors group">
<div class="bg-primary/20 text-primary p-3 rounded-full mb-3 group-hover:scale-110 transition-transform">
<span class="material-symbols-outlined text-3xl">add_photo_alternate</span>
</div>
<p class="text-sm font-semibold text-slate-700 dark:text-slate-300">Add Cover Photo</p>
<p class="text-xs text-slate-500 dark:text-slate-400 mt-1">1200 x 630 recommended</p>
</div>
</div>
<div class="h-2 bg-background-light dark:bg-zinc-950 w-full"></div>
<!-- Event Details Section -->
<div class="px-4 py-5 space-y-5">
<h3 class="text-xl font-bold text-slate-900 dark:text-slate-100">Event Details</h3>
<div class="space-y-4">
<div class="space-y-1.5">
<label class="text-sm font-medium text-slate-700 dark:text-slate-300">Event Title</label>
<input class="w-full rounded-lg border-gray-200 bg-gray-50 dark:bg-zinc-800 dark:border-zinc-700 text-slate-900 dark:text-slate-100 focus:border-primary focus:ring-primary h-12 px-4 text-base placeholder:text-gray-400" placeholder="e.g., Moriones Festival Parade" type="text"/>
</div>
<div class="grid grid-cols-2 gap-4">
<div class="space-y-1.5">
<label class="text-sm font-medium text-slate-700 dark:text-slate-300">Date</label>
<div class="relative">
<input class="w-full rounded-lg border-gray-200 bg-gray-50 dark:bg-zinc-800 dark:border-zinc-700 text-slate-900 dark:text-slate-100 focus:border-primary focus:ring-primary h-12 px-4 text-base" type="date"/>
</div>
</div>
<div class="space-y-1.5">
<label class="text-sm font-medium text-slate-700 dark:text-slate-300">Time</label>
<input class="w-full rounded-lg border-gray-200 bg-gray-50 dark:bg-zinc-800 dark:border-zinc-700 text-slate-900 dark:text-slate-100 focus:border-primary focus:ring-primary h-12 px-4 text-base" type="time"/>
</div>
</div>
<div class="space-y-1.5">
<label class="text-sm font-medium text-slate-700 dark:text-slate-300">Town Location</label>
<div class="relative">
<select class="w-full rounded-lg border-gray-200 bg-gray-50 dark:bg-zinc-800 dark:border-zinc-700 text-slate-900 dark:text-slate-100 focus:border-primary focus:ring-primary h-12 px-4 text-base appearance-none">
<option disabled="" selected="" value="">Select a town</option>
<option value="boac">Boac</option>
<option value="mogpog">Mogpog</option>
<option value="gasan">Gasan</option>
<option value="buenavista">Buenavista</option>
<option value="torrijos">Torrijos</option>
<option value="santa_cruz">Santa Cruz</option>
</select>
<span class="material-symbols-outlined absolute right-4 top-1/2 -translate-y-1/2 text-gray-500 pointer-events-none">expand_more</span>
</div>
</div>
<div class="space-y-1.5">
<label class="text-sm font-medium text-slate-700 dark:text-slate-300">Specific Venue</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-gray-400">location_on</span>
<input class="w-full rounded-lg border-gray-200 bg-gray-50 dark:bg-zinc-800 dark:border-zinc-700 text-slate-900 dark:text-slate-100 focus:border-primary focus:ring-primary h-12 pl-10 pr-4 text-base placeholder:text-gray-400" placeholder="e.g., Boac Town Plaza" type="text"/>
</div>
</div>
</div>
</div>
<div class="h-2 bg-background-light dark:bg-zinc-950 w-full"></div>
<!-- Category Section -->
<div class="px-4 py-5 space-y-4">
<h3 class="text-lg font-bold text-slate-900 dark:text-slate-100">Category</h3>
<div class="flex flex-wrap gap-2">
<label class="cursor-pointer">
<input checked="" class="peer sr-only" name="category" type="radio"/>
<div class="px-4 py-2 rounded-full border border-gray-200 bg-white dark:bg-zinc-800 dark:border-zinc-700 peer-checked:bg-primary peer-checked:border-primary peer-checked:text-black transition-all text-sm font-medium text-slate-600 dark:text-slate-300">
                            Festival
                        </div>
</label>
<label class="cursor-pointer">
<input class="peer sr-only" name="category" type="radio"/>
<div class="px-4 py-2 rounded-full border border-gray-200 bg-white dark:bg-zinc-800 dark:border-zinc-700 peer-checked:bg-primary peer-checked:border-primary peer-checked:text-black transition-all text-sm font-medium text-slate-600 dark:text-slate-300">
                            Religious
                        </div>
</label>
<label class="cursor-pointer">
<input class="peer sr-only" name="category" type="radio"/>
<div class="px-4 py-2 rounded-full border border-gray-200 bg-white dark:bg-zinc-800 dark:border-zinc-700 peer-checked:bg-primary peer-checked:border-primary peer-checked:text-black transition-all text-sm font-medium text-slate-600 dark:text-slate-300">
                            Sports
                        </div>
</label>
<label class="cursor-pointer">
<input class="peer sr-only" name="category" type="radio"/>
<div class="px-4 py-2 rounded-full border border-gray-200 bg-white dark:bg-zinc-800 dark:border-zinc-700 peer-checked:bg-primary peer-checked:border-primary peer-checked:text-black transition-all text-sm font-medium text-slate-600 dark:text-slate-300">
                            Government
                        </div>
</label>
<label class="cursor-pointer">
<input class="peer sr-only" name="category" type="radio"/>
<div class="px-4 py-2 rounded-full border border-gray-200 bg-white dark:bg-zinc-800 dark:border-zinc-700 peer-checked:bg-primary peer-checked:border-primary peer-checked:text-black transition-all text-sm font-medium text-slate-600 dark:text-slate-300">
                            Community
                        </div>
</label>
</div>
</div>
<div class="h-2 bg-background-light dark:bg-zinc-950 w-full"></div>
<!-- About Section -->
<div class="px-4 py-5 space-y-4">
<h3 class="text-lg font-bold text-slate-900 dark:text-slate-100">About the Event</h3>
<textarea class="w-full rounded-lg border-gray-200 bg-gray-50 dark:bg-zinc-800 dark:border-zinc-700 text-slate-900 dark:text-slate-100 focus:border-primary focus:ring-primary min-h-[140px] p-4 text-base placeholder:text-gray-400 resize-none" placeholder="Describe what people can expect at this event..."></textarea>
</div>
<!-- Spacer for bottom bar -->
<div class="h-20"></div>
</main>
<!-- Fixed Bottom Action Bar -->
<div class="fixed bottom-0 w-full max-w-md bg-white dark:bg-zinc-900 border-t border-gray-100 dark:border-zinc-800 px-4 py-4 z-20">
<button class="w-full bg-primary hover:bg-yellow-400 text-black font-bold text-lg py-3.5 rounded-xl shadow-sm transition-transform active:scale-[0.98] flex items-center justify-center gap-2">
<span>Post Event</span>
<span class="material-symbols-outlined text-xl">arrow_forward</span>
</button>
</div>
</div>
</body></html>
