<!DOCTYPE html>

<html class="" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Create Business Profile - Step 1</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Font+Unspecified:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">tailwind.config = {darkMode: "class", theme: {extend: {colors: {primary: "#f2d00d", "background-light": "#f8f8f5", "background-dark": "#221f10", "surface-light": "#ffffff", "surface-dark": "#2d2a1d", "text-main": "#1a1910", "text-main-dark": "#f2f0e6", "text-sub": "#6e6b5e", "text-sub-dark": "#a8a493", "border-light": "#e6e4db", "border-dark": "#423f30", "teal-accent": "#00897b"}, fontFamily: {display: "Font Unspecified"}, borderRadius: {DEFAULT: "0px", lg: "0px", xl: "0px", full: "0px"}}}};</script>
<style>
        /* Custom styles for select chevron to match design */
        select {
            -webkit-appearance: none;
            -moz-appearance: none;
            appearance: none;
            background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' fill='none' viewBox='0 0 20 20'%3e%3cpath stroke='%236e6b5e' stroke-linecap='round' stroke-linejoin='round' stroke-width='1.5' d='M6 8l4 4 4-4'/%3e%3c/svg%3e");
            background-position: right 0.5rem center;
            background-repeat: no-repeat;
            background-size: 1.5em 1.5em;
        }
        .dark select {
            background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' fill='none' viewBox='0 0 20 20'%3e%3cpath stroke='%23a8a493' stroke-linecap='round' stroke-linejoin='round' stroke-width='1.5' d='M6 8l4 4 4-4'/%3e%3c/svg%3e");
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display antialiased text-text-main dark:text-text-main-dark selection:bg-primary/30">
<div class="relative flex min-h-screen w-full flex-col mx-auto max-w-md bg-background-light dark:bg-background-dark overflow-x-hidden shadow-xl sm:my-8 sm:rounded-xl sm:border sm:border-border-light dark:sm:border-border-dark">
<!-- Header -->
<div class="sticky top-0 z-20 flex items-center bg-background-light/95 dark:bg-background-dark/95 backdrop-blur-sm p-4 border-b border-border-light dark:border-border-dark justify-between">
<button class="text-text-main dark:text-text-main-dark flex size-10 shrink-0 items-center justify-center rounded-full hover:bg-black/5 dark:hover:bg-white/10 transition-colors">
<span class="material-symbols-outlined">arrow_back</span>
</button>
<h2 class="text-lg font-bold leading-tight tracking-[-0.015em] flex-1 text-center pr-10">Create Business Profile</h2>
</div>
<!-- Progress Bar -->
<div class="flex flex-col gap-2 px-6 pt-6 pb-2">
<div class="flex gap-6 justify-between items-center">
<p class="text-text-main dark:text-text-main-dark text-sm font-semibold uppercase tracking-wider">Step 1 of 3</p>
<p class="text-teal-accent dark:text-teal-accent text-xs font-medium">Basic Info</p>
</div>
<div class="h-2 w-full rounded-full bg-border-light dark:bg-border-dark overflow-hidden">
<div class="h-full rounded-full bg-primary" style="width: 33%;"></div>
</div>
</div>
<div class="flex-1 overflow-y-auto">
<!-- Hero Text -->
<div class="px-6 py-4">
<h1 class="text-3xl font-extrabold leading-tight text-text-main dark:text-text-main-dark mb-2">Let's start with the basics</h1>
<p class="text-text-sub dark:text-text-sub-dark text-base">Tell us about your business so people in Marinduque can find you easily.</p>
</div>
<!-- Form Section -->
<form class="flex flex-col gap-6 px-6 pb-8">
<!-- Business Name -->
<div class="flex flex-col gap-2">
<label class="text-sm font-semibold text-text-main dark:text-text-main-dark" for="businessName">Business Name</label>
<input class="w-full rounded-lg border border-border-light dark:border-border-dark bg-surface-light dark:bg-surface-dark px-4 py-3.5 text-base text-text-main dark:text-text-main-dark placeholder:text-text-sub/50 dark:placeholder:text-text-sub-dark/50 focus:border-primary focus:ring-1 focus:ring-primary focus:outline-none transition-shadow" id="businessName" placeholder="e.g., Boac Heritage Hotel" type="text"/>
</div>
<!-- Category -->
<div class="flex flex-col gap-3">
<label class="text-sm font-semibold text-text-main dark:text-text-main-dark">Category</label>
<div class="grid grid-cols-2 gap-3">
<label class="group relative flex cursor-pointer rounded-lg border border-border-light dark:border-border-dark bg-surface-light dark:bg-surface-dark p-4 shadow-sm hover:border-primary transition-all has-[:checked]:border-primary has-[:checked]:bg-primary/5 has-[:checked]:ring-1 has-[:checked]:ring-primary">
<input class="sr-only" name="category" type="radio" value="dine"/>
<div class="flex flex-col items-center gap-2 w-full">
<span class="material-symbols-outlined text-3xl text-text-sub dark:text-text-sub-dark group-has-[:checked]:text-primary">restaurant</span>
<span class="font-medium text-sm text-text-main dark:text-text-main-dark">Dine</span>
</div>
</label>
<label class="group relative flex cursor-pointer rounded-lg border border-border-light dark:border-border-dark bg-surface-light dark:bg-surface-dark p-4 shadow-sm hover:border-primary transition-all has-[:checked]:border-primary has-[:checked]:bg-primary/5 has-[:checked]:ring-1 has-[:checked]:ring-primary">
<input class="sr-only" name="category" type="radio" value="stay"/>
<div class="flex flex-col items-center gap-2 w-full">
<span class="material-symbols-outlined text-3xl text-text-sub dark:text-text-sub-dark group-has-[:checked]:text-primary">hotel</span>
<span class="font-medium text-sm text-text-main dark:text-text-main-dark">Stay</span>
</div>
</label>
<label class="group relative flex cursor-pointer rounded-lg border border-border-light dark:border-border-dark bg-surface-light dark:bg-surface-dark p-4 shadow-sm hover:border-primary transition-all has-[:checked]:border-primary has-[:checked]:bg-primary/5 has-[:checked]:ring-1 has-[:checked]:ring-primary">
<input class="sr-only" name="category" type="radio" value="shop"/>
<div class="flex flex-col items-center gap-2 w-full">
<span class="material-symbols-outlined text-3xl text-text-sub dark:text-text-sub-dark group-has-[:checked]:text-primary">storefront</span>
<span class="font-medium text-sm text-text-main dark:text-text-main-dark">Shop</span>
</div>
</label>
<label class="group relative flex cursor-pointer rounded-lg border border-border-light dark:border-border-dark bg-surface-light dark:bg-surface-dark p-4 shadow-sm hover:border-primary transition-all has-[:checked]:border-primary has-[:checked]:bg-primary/5 has-[:checked]:ring-1 has-[:checked]:ring-primary">
<input class="sr-only" name="category" type="radio" value="service"/>
<div class="flex flex-col items-center gap-2 w-full">
<span class="material-symbols-outlined text-3xl text-text-sub dark:text-text-sub-dark group-has-[:checked]:text-primary">design_services</span>
<span class="font-medium text-sm text-text-main dark:text-text-main-dark">Service</span>
</div>
</label>
</div>
</div>
<!-- Town Selection -->
<div class="flex flex-col gap-2">
<label class="text-sm font-semibold text-text-main dark:text-text-main-dark" for="town">Town</label>
<div class="relative">
<select class="w-full appearance-none rounded-lg border border-border-light dark:border-border-dark bg-surface-light dark:bg-surface-dark px-4 py-3.5 text-base text-text-main dark:text-text-main-dark focus:border-primary focus:ring-1 focus:ring-primary focus:outline-none transition-shadow pr-10" id="town">
<option disabled="" selected="" value="">Select a town</option>
<option value="Boac">Boac</option>
<option value="Mogpog">Mogpog</option>
<option value="Gasan">Gasan</option>
<option value="Buenavista">Buenavista</option>
<option value="Torrijos">Torrijos</option>
<option value="Santa Cruz">Santa Cruz</option>
</select>
</div>
</div>
<!-- Description -->
<div class="flex flex-col gap-2">
<label class="text-sm font-semibold text-text-main dark:text-text-main-dark" for="description">Description</label>
<textarea class="w-full resize-none rounded-lg border border-border-light dark:border-border-dark bg-surface-light dark:bg-surface-dark px-4 py-3.5 text-base text-text-main dark:text-text-main-dark placeholder:text-text-sub/50 dark:placeholder:text-text-sub-dark/50 focus:border-primary focus:ring-1 focus:ring-primary focus:outline-none transition-shadow" id="description" placeholder="Briefly describe what you offer..." rows="4"></textarea>
</div>
<!-- Upload Section -->
<div class="flex flex-col gap-4 pt-2">
<label class="text-sm font-semibold text-text-main dark:text-text-main-dark">Visuals</label>
<div class="flex gap-4">
<!-- Logo Upload -->
<div class="flex flex-col items-center justify-center gap-2">
<div class="relative flex h-24 w-24 shrink-0 cursor-pointer flex-col items-center justify-center rounded-full border-2 border-dashed border-border-light dark:border-border-dark bg-surface-light dark:bg-surface-dark hover:bg-black/5 dark:hover:bg-white/5 transition-colors">
<span class="material-symbols-outlined text-text-sub dark:text-text-sub-dark">add_a_photo</span>
<input accept="image/*" class="absolute inset-0 cursor-pointer opacity-0" type="file"/>
</div>
<span class="text-xs font-medium text-text-sub dark:text-text-sub-dark">Logo</span>
</div>
<!-- Cover Photo Upload -->
<div class="flex flex-1 flex-col items-center justify-center gap-2">
<div class="relative flex h-24 w-full cursor-pointer flex-col items-center justify-center rounded-xl border-2 border-dashed border-border-light dark:border-border-dark bg-surface-light dark:bg-surface-dark hover:bg-black/5 dark:hover:bg-white/5 transition-colors">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-text-sub dark:text-text-sub-dark">image</span>
<span class="text-sm font-medium text-text-sub dark:text-text-sub-dark">Add Cover Photo</span>
</div>
<input accept="image/*" class="absolute inset-0 cursor-pointer opacity-0" type="file"/>
</div>
<span class="text-xs font-medium text-text-sub dark:text-text-sub-dark">Cover Photo (16:9)</span>
</div>
</div>
</div>
</form>
</div>
<!-- Sticky Footer Action -->
<div class="sticky bottom-0 z-10 w-full border-t border-border-light dark:border-border-dark bg-background-light dark:bg-background-dark p-4 backdrop-blur-md">
<button class="flex w-full items-center justify-center gap-2 rounded-xl bg-primary px-6 py-4 text-base font-bold text-black shadow-lg shadow-primary/20 transition-transform active:scale-[0.98] hover:bg-primary/90">
<span>Next Step</span>
<span class="material-symbols-outlined text-xl">arrow_forward</span>
</button>
</div>
</div>
</body></html>
