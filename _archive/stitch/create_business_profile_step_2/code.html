<body class="bg-background-light font-display min-h-screen text-slate-900 flex flex-col">
<div class="sticky top-0 z-50 flex items-center bg-white p-4 pb-2 border-b border-slate-100 shadow-sm">
<button class="text-slate-900 flex size-10 shrink-0 items-center justify-center rounded-full hover:bg-slate-50 transition-colors">
<span class="material-symbols-outlined text-2xl">arrow_back</span>
</button>
<h2 class="text-slate-900 text-lg font-bold leading-tight tracking-[-0.015em] flex-1 text-center pr-10">Create Business Profile</h2>
</div>
<div class="flex flex-col gap-3 px-4 py-6 bg-white">
<div class="flex gap-6 justify-between items-center">
<p class="text-slate-500 text-sm font-medium uppercase tracking-wide">Step 2 of 3: Location &amp; Contact</p>
<span class="text-secondary text-xs font-bold">66%</span>
</div>
<div class="rounded-full bg-slate-100 h-2 overflow-hidden">
<div class="h-full rounded-full bg-secondary transition-all duration-300 ease-out" style="width: 66%;"></div>
</div>
</div>
<div class="flex-1 overflow-y-auto pb-32 bg-white">
<div class="px-4 space-y-8">
<section>
<div class="flex items-center gap-3 mb-5">
<div class="bg-primary/10 p-2.5 rounded-lg text-primary">
<span class="material-symbols-outlined">location_on</span>
</div>
<h1 class="text-xl font-bold leading-tight text-slate-900">Where can customers find you?</h1>
</div>
<div class="space-y-5">
<label class="block group">
<p class="text-slate-700 text-sm font-semibold mb-2 ml-1">Select Town</p>
<div class="relative">
<select class="appearance-none w-full rounded-xl bg-surface border border-slate-200 px-4 py-4 pr-10 text-base text-slate-900 focus:border-secondary focus:ring-1 focus:ring-secondary outline-none transition-all shadow-sm group-hover:border-slate-300">
<option disabled="" selected="" value="">Choose a town</option>
<option value="boac">Boac</option>
<option value="mogpog">Mogpog</option>
<option value="gasan">Gasan</option>
<option value="buenavista">Buenavista</option>
<option value="torrijos">Torrijos</option>
<option value="santa_cruz">Santa Cruz</option>
</select>
<span class="material-symbols-outlined absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 pointer-events-none">expand_more</span>
</div>
</label>
<label class="block group">
<p class="text-slate-700 text-sm font-semibold mb-2 ml-1">Street Address / Barangay</p>
<input class="w-full rounded-xl bg-surface border border-slate-200 px-4 py-4 text-base text-slate-900 focus:border-secondary focus:ring-1 focus:ring-secondary outline-none placeholder:text-slate-400 transition-all shadow-sm group-hover:border-slate-300" placeholder="e.g. Purok 2, Brgy. Balanacan" type="text"/>
</label>
<div class="pt-2">
<p class="text-slate-700 text-sm font-semibold mb-2 ml-1">Pin Exact Location</p>
<div class="relative w-full h-48 rounded-xl overflow-hidden group cursor-pointer border border-slate-200 shadow-sm hover:shadow-md transition-shadow">
<div class="w-full h-full bg-blue-50 relative overflow-hidden">
<img alt="Map view of Marinduque province" class="w-full h-full object-cover opacity-90 group-hover:opacity-100 transition-opacity mix-blend-multiply" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBuYxIjop0n1P1fE_cEgEWZrOzxXLiBKFKoB8nqyCW8XCX4mShqyrthhCS1HOD7qBReBqMD0LN72JxOA3eyqAPADBHxG7fiklegvqHH6AavHu7P-pN_0W5Tpc_n1MgjAghmwSvKFkWpDqYJ5T1iryP4RbnCX8js_nh3NLJXRUQ9il1-d3DbOu4yPMZXnL6RzEzJOtP_FR0JVgFO5VeUIEIrUAFHF_Wb8oJzeu8N5YPFODE97lXcKn_yOQW5VdytWefvVzu4m2_Rvt8"/>
<div class="absolute inset-0 bg-white/10"></div>
</div>
<div class="absolute inset-0 flex flex-col items-center justify-center pointer-events-none">
<div class="bg-white/95 backdrop-blur-sm px-4 py-2.5 rounded-full shadow-lg border border-slate-100 flex items-center gap-2 transform group-hover:-translate-y-1 transition-transform duration-300">
<span class="material-symbols-outlined text-red-500">push_pin</span>
<span class="text-sm font-bold text-slate-700">Tap to set pin</span>
</div>
</div>
</div>
<p class="text-xs text-slate-500 mt-2.5 flex items-center gap-1.5 ml-1">
<span class="material-symbols-outlined text-[16px] text-secondary">info</span>
                        Moving the pin helps customers find you easily.
                    </p>
</div>
</div>
</section>
<div class="h-px bg-slate-100 my-6"></div>
<section>
<div class="flex items-center gap-3 mb-5">
<div class="bg-primary/10 p-2.5 rounded-lg text-primary">
<span class="material-symbols-outlined">perm_contact_calendar</span>
</div>
<h1 class="text-xl font-bold leading-tight text-slate-900">Contact Details</h1>
</div>
<div class="space-y-5">
<label class="block group">
<p class="text-slate-700 text-sm font-semibold mb-2 ml-1">Mobile Number</p>
<div class="relative">
<div class="absolute left-4 top-1/2 -translate-y-1/2 flex items-center gap-2 border-r border-slate-200 pr-3">
<span class="text-slate-500 text-sm font-medium">+63</span>
</div>
<input class="w-full rounded-xl bg-surface border border-slate-200 pl-16 pr-4 py-4 text-base text-slate-900 focus:border-secondary focus:ring-1 focus:ring-secondary outline-none placeholder:text-slate-400 transition-all shadow-sm group-hover:border-slate-300" placeholder="912 345 6789" type="tel"/>
</div>
</label>
<label class="block group">
<p class="text-slate-700 text-sm font-semibold mb-2 ml-1">Facebook Messenger Link</p>
<div class="relative">
<span class="absolute left-4 top-1/2 -translate-y-1/2 material-symbols-outlined text-slate-400">chat</span>
<input class="w-full rounded-xl bg-surface border border-slate-200 pl-12 pr-4 py-4 text-base text-slate-900 focus:border-secondary focus:ring-1 focus:ring-secondary outline-none placeholder:text-slate-400 transition-all shadow-sm group-hover:border-slate-300" placeholder="m.me/yourbusiness" type="url"/>
</div>
</label>
<label class="block group">
<p class="text-slate-700 text-sm font-semibold mb-2 ml-1">Email Address <span class="text-slate-400 font-normal italic">(Optional)</span></p>
<div class="relative">
<span class="absolute left-4 top-1/2 -translate-y-1/2 material-symbols-outlined text-slate-400">mail</span>
<input class="w-full rounded-xl bg-surface border border-slate-200 pl-12 pr-4 py-4 text-base text-slate-900 focus:border-secondary focus:ring-1 focus:ring-secondary outline-none placeholder:text-slate-400 transition-all shadow-sm group-hover:border-slate-300" placeholder="hello@business.com" type="email"/>
</div>
</label>
</div>
</section>
</div>
</div>
<div class="fixed bottom-0 left-0 right-0 p-4 bg-white/90 border-t border-slate-100 flex gap-3 z-40 backdrop-blur-xl">

</button>
