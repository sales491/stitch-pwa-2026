<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Post a Gem - Marinduque</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#f2d00d",
                        "primary-hover": "#d9ba0b", 
                        "background-light": "#f8f8f5",
                        "background-dark": "#221f10",
                        "surface-light": "#ffffff",
                        "surface-dark": "#2a2718",
                        "text-main-light": "#181711",
                        "text-main-dark": "#f5f3ef",
                        "text-sub-light": "#8a8460",
                        "text-sub-dark": "#a39f85",
                        "border-light": "#e6e4db",
                        "border-dark": "#3a3625",
                    },
                    fontFamily: {
                        "display": ["Plus Jakarta Sans", "sans-serif"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        /* Custom scrollbar hide for cleaner look */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-text-main-light dark:text-text-main-dark min-h-screen flex flex-col antialiased">
<!-- Header -->
<header class="sticky top-0 z-50 bg-surface-light/95 dark:bg-surface-dark/95 backdrop-blur-sm border-b border-border-light dark:border-border-dark px-4 py-3 flex items-center justify-between">
<button class="flex items-center justify-center w-10 h-10 rounded-full hover:bg-background-light dark:hover:bg-background-dark transition-colors text-text-main-light dark:text-text-main-dark">
<span class="material-symbols-outlined">close</span>
</button>
<h1 class="text-lg font-bold">Post a Gem</h1>
<button class="text-primary font-bold text-sm hover:opacity-80 transition-opacity">
            Drafts
        </button>
</header>
<!-- Main Content -->
<main class="flex-1 overflow-y-auto no-scrollbar pb-24">
<!-- Photo Upload Section -->
<div class="p-4">
<div class="relative w-full aspect-[4/3] rounded-xl border-2 border-dashed border-primary/40 bg-primary/5 dark:bg-primary/10 flex flex-col items-center justify-center gap-3 transition-colors hover:bg-primary/10 dark:hover:bg-primary/15 cursor-pointer group">
<div class="w-16 h-16 rounded-full bg-surface-light dark:bg-surface-dark shadow-sm flex items-center justify-center text-primary group-hover:scale-110 transition-transform">
<span class="material-symbols-outlined text-3xl">add_a_photo</span>
</div>
<div class="text-center px-4">
<p class="font-semibold text-text-main-light dark:text-text-main-dark">Tap to upload photos</p>
<p class="text-sm text-text-sub-light dark:text-text-sub-dark mt-1">Show us the beauty of Marinduque</p>
</div>
<!-- Hidden Input -->
<input accept="image/*" class="absolute inset-0 w-full h-full opacity-0 cursor-pointer" multiple="" type="file"/>
</div>
<!-- Horizontal scroll for uploaded previews (empty state placeholder hidden) -->
<div class="flex gap-2 mt-3 overflow-x-auto no-scrollbar hidden">
<!-- Example preview item -->
<div class="relative flex-shrink-0 w-20 h-20 rounded-lg overflow-hidden bg-gray-200">
<img alt="Preview" class="w-full h-full object-cover" data-alt="Small beach thumbnail" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDziNUi6RNwohnf6MLnbq0FB-487Elg5667_HYlHZV2r1dF0d0_zg-tQ0XWS9xv68IKsFq7l5zVaFxN9YT9ZdYCCOBQM73WW3nxO_vH8st-9WbYbDnWIHGIqsCQxBQCp2CFeQ4hfOKk1My2HYlPYYPAnvCiITwxVA5G8k4CHvq3USlzxiWElThn2wcoLPhhHrP4YgYY0EgW7LXzMzLeej7mgn3WGvKdRNfAtuuRSTxBxE4bCmjnWo8JbOokRCxNvwpVwkuyJT1DqxE"/>
</div>
</div>
</div>
<!-- Form Fields -->
<div class="px-4 space-y-6">
<!-- Name Input -->
<div class="space-y-2">
<label class="block text-sm font-semibold text-text-main-light dark:text-text-main-dark" for="place-name">
                    What is this place?
                </label>
<div class="relative">
<span class="absolute left-3 top-1/2 -translate-y-1/2 text-text-sub-light dark:text-text-sub-dark">
<span class="material-symbols-outlined text-[20px]">flag</span>
</span>
<input class="w-full pl-10 pr-4 py-3 bg-surface-light dark:bg-surface-dark border border-border-light dark:border-border-dark rounded-lg text-text-main-light dark:text-text-main-dark placeholder:text-text-sub-light dark:placeholder:text-text-sub-dark focus:ring-2 focus:ring-primary focus:border-transparent transition-shadow outline-none" id="place-name" placeholder="e.g., Poctoy White Beach" type="text"/>
</div>
</div>
<!-- Town Select -->
<div class="space-y-2">
<label class="block text-sm font-semibold text-text-main-light dark:text-text-main-dark" for="town-select">
                    Where in Marinduque?
                </label>
<div class="relative">
<span class="absolute left-3 top-1/2 -translate-y-1/2 text-text-sub-light dark:text-text-sub-dark pointer-events-none">
<span class="material-symbols-outlined text-[20px]">location_on</span>
</span>
<select class="w-full pl-10 pr-10 py-3 appearance-none bg-surface-light dark:bg-surface-dark border border-border-light dark:border-border-dark rounded-lg text-text-main-light dark:text-text-main-dark focus:ring-2 focus:ring-primary focus:border-transparent transition-shadow outline-none cursor-pointer" id="town-select">
<option disabled="" selected="" value="">Select a municipality</option>
<option value="Boac">Boac</option>
<option value="Buenavista">Buenavista</option>
<option value="Gasan">Gasan</option>
<option value="Mogpog">Mogpog</option>
<option value="Santa Cruz">Santa Cruz</option>
<option value="Torrijos">Torrijos</option>
</select>
<span class="absolute right-3 top-1/2 -translate-y-1/2 text-text-sub-light dark:text-text-sub-dark pointer-events-none">
<span class="material-symbols-outlined text-[20px]">expand_more</span>
</span>
</div>
</div>
<!-- Location Tagger Button -->
<button class="w-full flex items-center justify-between p-3 rounded-lg border border-border-light dark:border-border-dark bg-surface-light dark:bg-surface-dark hover:bg-background-light dark:hover:bg-background-dark transition-colors group">
<div class="flex items-center gap-3">
<div class="w-8 h-8 rounded-full bg-primary/20 text-primary-dark dark:text-primary flex items-center justify-center">
<span class="material-symbols-outlined text-[18px]">map</span>
</div>
<span class="font-medium text-sm text-text-main-light dark:text-text-main-dark">Pin exact location on map</span>
</div>
<span class="material-symbols-outlined text-text-sub-light dark:text-text-sub-dark group-hover:translate-x-1 transition-transform">chevron_right</span>
</button>
<!-- Description Textarea -->
<div class="space-y-2">
<label class="block text-sm font-semibold text-text-main-light dark:text-text-main-dark" for="story">
                    Why is it a gem?
                </label>
<textarea class="w-full p-3 bg-surface-light dark:bg-surface-dark border border-border-light dark:border-border-dark rounded-lg text-text-main-light dark:text-text-main-dark placeholder:text-text-sub-light dark:placeholder:text-text-sub-dark focus:ring-2 focus:ring-primary focus:border-transparent transition-shadow outline-none resize-none" id="story" placeholder="Share the story, history, or your personal experience..." rows="4"></textarea>
</div>
<div class="h-4"></div> <!-- Spacer -->
</div>
</main>
<!-- Bottom Action Bar (Floating) -->
<div class="fixed bottom-[88px] left-0 right-0 p-4 bg-gradient-to-t from-background-light to-transparent dark:from-background-dark pointer-events-none z-40">
<button class="pointer-events-auto w-full bg-primary hover:bg-primary-hover text-text-main-light font-bold py-4 rounded-xl shadow-lg shadow-primary/20 active:scale-[0.98] transition-all flex items-center justify-center gap-2">
<span class="material-symbols-outlined">send</span>
            Share with Community
        </button>
</div>
<!-- Bottom Navigation -->
<nav class="fixed bottom-0 left-0 right-0 z-50 bg-surface-light dark:bg-surface-dark border-t border-border-light dark:border-border-dark pb-safe">
<div class="flex items-center justify-around h-16 px-2">
<a class="flex flex-col items-center justify-center w-full h-full gap-1 text-text-sub-light dark:text-text-sub-dark hover:text-primary dark:hover:text-primary transition-colors" href="#">
<span class="material-symbols-outlined text-[24px]">home</span>
<span class="text-[10px] font-medium">Home</span>
</a>
<a class="flex flex-col items-center justify-center w-full h-full gap-1 text-text-sub-light dark:text-text-sub-dark hover:text-primary dark:hover:text-primary transition-colors" href="#">
<span class="material-symbols-outlined text-[24px]">explore</span>
<span class="text-[10px] font-medium">Explore</span>
</a>
<a class="flex flex-col items-center justify-center w-full h-full gap-1 text-primary dark:text-primary" href="#">
<div class="w-10 h-10 rounded-full bg-primary/10 flex items-center justify-center mb-1">
<span class="material-symbols-outlined text-[24px] fill-current">add_circle</span>
</div>
<span class="text-[10px] font-bold">Post</span>
</a>
<a class="flex flex-col items-center justify-center w-full h-full gap-1 text-text-sub-light dark:text-text-sub-dark hover:text-primary dark:hover:text-primary transition-colors" href="#">
<span class="material-symbols-outlined text-[24px]">favorite</span>
<span class="text-[10px] font-medium">Saved</span>
</a>
<a class="flex flex-col items-center justify-center w-full h-full gap-1 text-text-sub-light dark:text-text-sub-dark hover:text-primary dark:hover:text-primary transition-colors" href="#">
<span class="material-symbols-outlined text-[24px]">person</span>
<span class="text-[10px] font-medium">Profile</span>
</a>
</div>
</nav>
<!-- Safe area padding for iPhones without home button -->
<div class="h-6 w-full bg-surface-light dark:bg-surface-dark hidden"></div>
</body></html>
